version: '3.8'

services:
  mariadb:
    container_name: mariadb
    build: ./requirements/mariadb
    image: mariadb:inception
    env_file: .env
    secrets:
      - db_root_password
      - db_password
    networks:
      - inception
    volumes:
      - db-data:/var/lib/mysql
    restart: always
  
  redis:
    container_name: redis
    build:
      context: ./requirements/bonus/redis # Path to your redis folder
      dockerfile: Dockerfile
    image: redis:inception
    networks:
      - inception
    volumes:
      - redis-data:/data # Better for Redis persistence (RDB/AOF files)
      - wp-data:/var/www/wordpress
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  wordpress:
    container_name: wordpress
    build: ./requirements/wordpress
    image: wordpress:inception
    env_file: .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password # Add this
    depends_on:
      - mariadb
    networks:
      - inception
    volumes:
      - wp-data:/var/www/wordpress
    restart: always

  nginx:
    container_name: nginx
    build: ./requirements/nginx
    image: nginx:inception
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - wp-data:/var/www/wordpress
    restart: always

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/credentials.txt
  wp_user_password:
    file: ../secrets/user_credentials.txt

networks:
  inception:
    driver: bridge

volumes:
  db-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/mariadb'
  wp-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/wordpress'
  redis-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/redis'



