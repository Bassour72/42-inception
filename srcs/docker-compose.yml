version: '0.1'

services:

  
  mariadb:
    container_name: mariadb
    build:
      context: ./requirements/mariadb
      dockerfile: Dockerfile
    image: mariadb:inception
    env_file: .env
    secrets:
      - db_root_password
      - db_password
    networks:
      - inception
    volumes:
      - db-data:/var/lib/mysql
    restart: on-failure
  

  adminer:
    container_name: adminer
    build: ./requirements/bonus/Adminer
    image: adminer:inception
    depends_on:
      - mariadb
    networks:
      - inception
    restart: on-failure

  redis:
    container_name: redis
    build:
      context: ./requirements/bonus/redis 
      dockerfile: Dockerfile
    image: redis:inception
    networks:
      - inception
    restart: on-failure
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  wordpress:
    container_name: wordpress
    build:
      context: ./requirements/wordpress
      dockerfile: Dockerfile
    image: wordpress:inception
    env_file: .env
    secrets:
      - db_password
      - wp_admin_password
      - wp_user_password
    depends_on:
      - mariadb
      - redis
      - ftp
    networks:
      - inception
    volumes:
      - wp-data:/var/www/wordpress
    restart: on-failure


  ftp:
    container_name: ftp
    build: ./requirements/bonus/ftp
    image: ftp:inception
    env_file: .env
    ports:
      - "21:21"
      - "30000-30050:30000-30050"
    volumes:
      - wp-data:/var/www/wordpress
    environment:
      - FTP_USER=${FTP_USER}
      - FTP_PWD=${FTP_PWD}
    networks:
      - inception
    restart: on-failure


  static_site:
    container_name: static_site
    build: ./requirements/bonus/static_site
    image: static_site:inception
    networks:
      - inception
    restart: on-failure

  cadvisor:
    container_name: cadvisor
    build:
      context: ./requirements/bonus/cAdvisor
      dockerfile: Dockerfile
    image: cadvisor:inception
    networks:
      - inception

    privileged: true

    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /dev/disk/:/dev/disk:ro
    devices:
      - /dev/kmsg
    restart: on-failure


  nginx:
    container_name: nginx
    build:
      context: ./requirements/nginx
      dockerfile: Dockerfile
    env_file: .env
    environment:
      - CADVISOR_USER=${CADVISOR_USER}
      - CADVISOR_PWD=${CADVISOR_PWD}
    image: nginx:inception
    ports:
      - "443:443"
    depends_on:
      - wordpress
    networks:
      - inception
    volumes:
      - wp-data:/var/www/wordpress
    restart: on-failure # TOdo on
  

secrets:
  db_root_password:
    file: ../secrets/db_root_password.txt
  db_password:
    file: ../secrets/db_password.txt
  wp_admin_password:
    file: ../secrets/credentials.txt
  wp_user_password: 
    file: ../secrets/wp_user_password.txt
  ca_user_password:
    file: ../secrets/ca_user_password.txt

networks:
  inception:
    driver: bridge

volumes:
  db-data:
    driver: local
    driver_opts:
      type: 'none'
      o: 'bind'
      device: '/home/${USER}/data/mariadb'

  wp-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: '/home/${USER}/data/wordpress'
  
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: '/home/${USER}/data/redis'

  ca-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: '/home/${USER}/data/cadvisor'

